name: Needs verification command

# Lets maintainers comment `/needs-verification` on an issue or PR to ask the
# author to manually verify their change and provide repro steps / screenshots.
# It posts a templated message (linking to the "Verify your own changes" section
# of CONTRIBUTING.md) and applies the needs-author-feedback label, which plugs
# into the existing stale-bot automation in .github/policies/resourceManagement.yml.

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write

jobs:
  needs-verification:
    runs-on: ubuntu-latest
    # Only act on the command, and only when invoked by a repo collaborator/member/owner.
    if: >-
      contains(github.event.comment.body, '/needs-verification') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    steps:
      - name: Add needs-author-feedback label
        run: gh api "repos/$REPO/issues/$NUMBER/labels" -f "labels[]=needs-author-feedback"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}

      - name: Post verification request
        run: gh api "repos/$REPO/issues/$NUMBER/comments" -f body="$BODY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          BODY: |
            Thanks for your contribution! Before this can move forward, we need the author to confirm the change has been **manually verified**.

            Please reply with:
            - The repro / verification steps you followed to confirm the new behavior works (and that existing behavior isn't regressed).
            - Where relevant, a screenshot or short screen recording showing the new behavior.

            See [Verify your own changes](https://github.com/microsoft/microsoft-ui-xaml/blob/main/CONTRIBUTING.md#verify-your-own-changes) for what we're looking for.

            I've added the **needs-author-feedback** label; it will be cleared automatically once you respond.
